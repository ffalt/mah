<div class="sr-only" aria-live="polite" aria-atomic="true">{{ announceText() }}</div>

<app-dialog
	#tutorial (clickEvent)="toggleDialogState($event)" className="overlay-tutorial overlay-size-small"
	[noCloseButton]="true" [allowCloseOverlay]="false" [title]="app.name"
>
	@if (tutorial.visible()) {
		<app-tutorial (completed)="completeTutorial()"/>
	}
</app-dialog>

<app-dialog #help (clickEvent)="toggleDialogState($event)" className="overlay-help overlay-size-large" [title]="title">
	@if (help.visible()) {
		<app-help (showTutorial)="help.toggle(); showTutorial()"/>
	}
</app-dialog>

<app-dialog #info (clickEvent)="toggleDialogState($event)" className="overlay-info overlay-size-large" [title]="'TILES' | translate">
	@if (info.visible()) {
		<app-tiles-info/>
	}
</app-dialog>

<app-dialog #settings (clickEvent)="toggleDialogState($event)" className="overlay-settings overlay-size-medium" [title]="'SETTINGS' | translate">
	@if (settings.visible()) {
		<app-settings/>
	}
</app-dialog>

<app-dialog #newgame (clickEvent)="toggleDialogState($event)" className="overlay-newgame overlay-size-large" [title]="'SELECT_BOARD' | translate">
	@if (newgame.visible()) {
		<app-choose-layout class="choose" (startEvent)="startGame($event)" [gameMode]="game.mode()" [buildMode]="game.board.buildMode"/>
	}
</app-dialog>

<app-game-message (messageEvent)="clickMessage($event)" (shuffleEvent)="onShuffleContinue($event)" (surrenderEvent)="onSurrenderGame($event)"/>

@if (!zenMode()) {
	<app-controls-top
		class="controls controls-top"
		[gameMode]="game.mode()"
		(helpEvent)="help.toggle()"
		(shuffleEvent)="onShuffle()"
		(undoEvent)="onUndo()"
		(hintEvent)="onHint()"
		(newGameEvent)="newGame()"
	/>
}

<app-board
	class="board"
	[stones]="game.board.stones()"
	[theme]="app.settings.theme()"
	[imageSet]="app.settings.tileset()"
	[kyodaiUrl]="app.settings.kyodaiUrl()"
	[background]="app.settings.background()"
	[pattern]="app.settings.pattern()"
	(clickEvent)="stoneClick($event)"
/>

@if (zenMode()) {
	<app-zen-controls
		class="zen-controls"
		role="toolbar"
		[attr.aria-label]="'ZEN_MODE' | translate"
		[gameMode]="game.mode()"
		(undoEvent)="onUndo()"
		(hintEvent)="onHint()"
		(exitEvent)="exitZenMode()"
	/>
} @else {
	<app-controls-bottom
		class="controls controls-bottom"
		[fullScreenEnabled]="fullScreenEnabled"
		(settingsEvent)="settings.toggle()"
		(infoEvent)="info.toggle()"
		(zenEvent)="toggleZenMode()"
		(fullscreenEvent)="enterFullScreen()"
	/>
}
