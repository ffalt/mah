<svg xmlns="http://www.w3.org/2000/svg" viewBox="-2 -2 84 108" preserveAspectRatio="xMidYMid meet">
	<defs>
		<svg id="preview-front" width="300" height="400" viewBox="0 0 300 400">
			<path transform="translate(28,-614)"
						style="fill:#ffffff;fill-opacity:0.3;fill-rule:evenodd;stroke:none;filter: blur(10px);"
						d="M -4.7687833,775.07096 C -9.6501835,741.99485 -16.84552,674.23676 -1.2788716,652.0641 18.998297,625.94378 233.50094,631.63117 263.31435,653.90999 276.21398,662.64856 70.349579,663.12124 47.099353,691.74479 24.390958,719.11242 0.65060847,818.18718 -4.7687833,775.07096 Z"/>
		</svg>
		<clipPath id="preview-image-clip">
			<rect
				[attr.x]="imageCut[0]"
				[attr.y]="imageCut[1]"
				[attr.width]="imageCut[2]"
				[attr.height]="imageCut[3]"
				rx="10" ry="10" fill="#fff"/>
		</clipPath>
		<defs app-image-set-loader [imageSet]="app.settings.tileset" [kyodaiUrl]="app.settings.kyodaiUrl" [dark]="app.settings.dark" prefix="preview_"></defs>
	</defs>
	<style>
		g.preview-stage g.draw rect.shadow {
			fill: #191919;
			opacity: 0.6;
			stroke-width: 1;
			stroke: black;
		}

		g.preview-stage g.draw rect.stone {
			fill: #FFF9E5;
			stroke-width: 1;
			stroke: black;
		}

		g.preview-stage.tile3d g.draw rect.shadow {
			fill: #a89488;
			opacity: 1;
			stroke-width: 0;
			stroke: none;
		}

		g.preview-stage.tile3d g.draw rect.stone {
			stroke: #a09085;
		}

		g.preview-stage.tile3d g.draw rect.bevel {
			fill: none;
			stroke-width: 1.5;
			stroke: rgba(255, 255, 255, 0.6);
		}

		g.preview-stage.contrast g.draw rect.stone {
			stroke-width: 2;
		}

		g.preview-stage.contrast g.draw rect.shadow {
			opacity: 0.7;
		}

		g.preview-stage.tile3d.contrast g.draw rect.shadow {
			fill: #7a6c63;
			opacity: 1;
		}

		g.preview-stage.dark g.draw rect.shadow {
			opacity: 0.6;
			stroke-width: 1;
			fill: #9d948c;
			stroke: green;
		}

		g.preview-stage.dark g.draw rect.stone {
			fill: #000;
			stroke-width: 1;
			stroke: #9d948c;
		}

		g.preview-stage.dark.tile3d g.draw rect.shadow {
			opacity: 1;
			stroke-width: 0;
			fill: #5a524e;
			stroke: none;
		}

		g.preview-stage.dark.tile3d g.draw rect.stone {
			fill: #1a1512;
			stroke: #6a5e58;
		}

		g.preview-stage.dark.tile3d g.draw rect.bevel {
			fill: none;
			stroke-width: 1.5;
			stroke: rgba(255, 255, 255, 0.12);
		}

		g.preview-stage.dark.contrast g.draw rect.stone {
			stroke-width: 2;
		}

		g.preview-stage.dark.contrast g.draw rect.shadow {
			opacity: 0.7;
		}

		g.preview-stage.dark.tile3d.contrast g.draw rect.shadow {
			fill: #3e3834;
			opacity: 1;
		}

		g.preview-stage.dark .front {
			display: none;
		}

		g.preview-stage.dark .front {
			display: unset;
		}
	</style>
	<g class="preview-stage" [class.dark]="app.settings.dark" [class.contrast]="app.settings.contrast" [class.tile3d]="app.settings.tile3d">
		<g class="draw">
			<g class="tile">
				@if (app.settings.tile3d) {
					<rect class="shadow" x="5" y="5" width="75" height="100" rx="10" ry="10"></rect>
					<rect class="stone" x="0" y="0" width="75" height="100" rx="10" ry="10"></rect>
					<rect class="bevel" x="1" y="1" width="73" height="98" rx="9" ry="9"></rect>
				} @else {
					<rect class="shadow" x="3" y="3" width="75" height="100" rx="10" ry="10"></rect>
					<rect class="stone" x="0" y="0" width="75" height="100" rx="10" ry="10"></rect>
				}
				<use
					[attr.xlink:href]="'#preview_' + tile()"
					[attr.x]="imagePos[0]"
					[attr.y]="imagePos[1]"
					[attr.width]="imagePos[2]"
					[attr.height]="imagePos[3]"
					clip-path="url(#preview-image-clip)"
				/>
				<use class="front" xlink:href="#preview-front" x="0" y="0" width="75" height="100"/>
			</g>
		</g>
	</g>
</svg>
