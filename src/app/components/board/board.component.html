<svg
	#boardSVG
	xmlns="http://www.w3.org/2000/svg" class="board-svg" preserveAspectRatio="xMidYMid meet"
	[class.rotate]="rotate()"
	[attr.viewBox]="viewport()"
	(mouseup)="onMouseUp($event)"
>
	<defs>
		<svg id="front" width="300" height="400" viewBox="0 0 300 400">
			<path
				transform="translate(28,-614)"
				style="fill:#ffffff;fill-opacity:0.3;fill-rule:evenodd;stroke:none;filter: blur(10px);"
				d="M -4.7687833,775.07096 C -9.6501835,741.99485 -16.84552,674.23676 -1.2788716,652.0641 18.998297,625.94378 233.50094,631.63117 263.31435,653.90999 276.21398,662.64856 70.349579,663.12124 47.099353,691.74479 24.390958,719.11242 0.65060847,818.18718 -4.7687833,775.07096 Z"
			/>
		</svg>
		<clipPath id="mah-image-clip">
			<rect
				[attr.x]="imageCut[0]"
				[attr.y]="imageCut[1]"
				[attr.width]="imageCut[2]"
				[attr.height]="imageCut[3]"
				rx="10" ry="10" fill="#fff"
			/>
		</clipPath>
	</defs>
	<style>
		g.tile {
			transform-origin: 50px 32.5px;
			opacity: 1;
			transition: transform 120ms ease-in-out;
		}

		@keyframes mah-wiggle {
			0% {
				transform: rotate(0deg);
			}
			20% {
				transform: rotate(-3deg);
			}
			40% {
				transform: rotate(3deg);
			}
			60% {
				transform: rotate(-1deg);
			}
			80% {
				transform: rotate(1deg);
			}
			100% {
				transform: rotate(0deg);
			}
		}

		g.wiggle g.tile {
			animation: mah-wiggle 250ms ease-in-out;
		}

		g.hinted g.tile {
			animation: mah-match-flash 3000ms ease-out infinite;
		}

		g.hinted g.tile > rect {
			stroke: #ff5900;
			stroke-width: 3px;
		}

		@keyframes mah-match-flash {
			0% { transform: scale(1); }
			40% { transform: scale(1.14); }
			100% { transform: scale(1); }
		}

		g.matched g.tile {
			animation: mah-match-flash 600ms ease-out;
		}

		g.matched g.tile > rect {
			stroke: #0066cc;
			stroke-width: 2px;
		}

		@keyframes mah-select-pop {
			0% {
				transform: scale(1);
			}
			60% {
				transform: scale(1.08);
			}
			100% {
				transform: scale(1.04);
			}
		}

		g.selected g.tile {
			transform: scale(1.04);
			animation: mah-select-pop 140ms ease-out;
		}

		g.selected g.tile rect.stone {
			stroke: black;
			fill: #F8EABB;
		}

		g.selected.hinted g.tile {
			animation: mah-match-flash 2000ms ease-out infinite;
		}

		g.selected.hinted g.tile rect.stone {
			stroke: #ff5900;
			stroke-width: 3px;
		}

		g.draw rect.shadow {
			fill: #191919;
			opacity: 0.6;
			stroke-width: 1;
			stroke: black;
		}

		g.draw rect.stone {
			fill: #FFF9E5;
			stroke-width: 1;
			stroke: black;
		}

		g.stage.tile3d g.draw rect.shadow {
			fill: #a89488;
			opacity: 1;
			stroke-width: 0;
			stroke: none;
		}

		g.stage.tile3d g.draw rect.stone {
			stroke: #a09085;
		}

		g.stage.tile3d g.draw rect.bevel {
			fill: none;
			stroke-width: 1.5;
			stroke: rgba(255, 255, 255, 0.6);
		}

		g.stage.tile3d g.hinted g.tile rect.stone {
			stroke: #ff5900;
			stroke-width: 3px;
		}

		g.stage.tile3d g.selected.hinted g.tile rect.stone {
			stroke: #ff5900;
			stroke-width: 3px;
		}

		g.stage.tile3d g.matched g.tile rect.stone {
			stroke: #0066cc;
			stroke-width: 2px;
		}

		g.hidden {
			opacity: 0;
		}

		g.stage.contrast g.draw rect.stone {
			stroke-width: 2;
		}

		g.stage.contrast g.draw rect.shadow {
			opacity: 0.7;
		}

		g.stage.tile3d.contrast g.draw rect.shadow {
			fill: #7a6c63;
			opacity: 1;
		}

		g.stage.dark g.draw rect.shadow {
			opacity: 0.6;
			stroke-width: 1;
			fill: #9d948c;
			stroke: green;
		}

		g.stage.dark g.draw rect.stone {
			fill: #000;
			stroke-width: 1;
			stroke: #9d948c;
		}

		g.stage.dark.tile3d g.draw rect.shadow {
			opacity: 1;
			stroke-width: 0;
			fill: #5a524e;
			stroke: none;
		}

		g.stage.dark.tile3d g.draw rect.stone {
			fill: #1a1512;
			stroke: #6a5e58;
		}

		g.stage.dark.tile3d g.draw rect.bevel {
			fill: none;
			stroke-width: 1.5;
			stroke: rgba(255, 255, 255, 0.12);
		}

		g.stage.dark.tile3d g.hinted g.tile rect.stone {
			stroke: #ef0202;
			stroke-width: 3px;
		}

		g.stage.dark.tile3d g.selected.hinted g.tile rect.stone {
			stroke: #ef0202;
			stroke-width: 3px;
		}

		g.stage.dark.tile3d g.matched g.tile rect.stone {
			stroke: #4499ff;
			stroke-width: 2px;
		}

		g.stage.dark g.selected g.tile rect.stone {
			stroke: #F8EABB;
			fill: black;
		}

		g.stage.dark g.hinted g.tile rect.stone {
			stroke: #ef0202;
		}

		g.stage.dark g.selected.hinted g.tile rect.stone {
			stroke: #ef0202;
		}

		g.stage.dark g.matched g.tile rect.stone {
			stroke: #4499ff;
		}

		g.stage.dark.contrast g.draw rect.stone {
			stroke-width: 2;
		}

		g.stage.dark.contrast g.draw rect.shadow {
			opacity: 0.7;
		}

		g.stage.dark.tile3d.contrast g.draw rect.shadow {
			fill: #3e3834;
			opacity: 1;
		}

		g.stage.dark .front {
			display: none;
		}

		g.stage.dark .front {
			display: unset;
		}

		@media (prefers-reduced-motion: reduce) {
			g.tile {
				transition: none;
			}

			g.wiggle g.tile {
				animation: none;
			}

			g.selected g.tile {
				animation: none;
			}

			g.matched g.tile {
				animation: none;
			}

			g.hinted g.tile,
			g.selected.hinted g.tile {
				animation: none;
				transform: scale(1.12);
			}
		}
	</style>
	<defs app-image-set-loader [imageSet]="imageSet()" [kyodaiUrl]="kyodaiUrl()" [dark]="app.settings.dark()" [prefix]="prefix"></defs>
	<g #stage class="stage" [class.dark]="app.settings.dark()" [class.contrast]="app.settings.contrast()" [class.tile3d]="app.settings.tile3d()">
		@for (draw of drawStones; track draw.key) {
			<g
				app-board-tile
				class="draw"
				[draw]="draw"
				[imagePos]="imagePos"
				[urlPrefix]="urlPrefix"
				(mouseup)="onClickUp($event, draw)"
				(touchend)="onTouchTileEnd($event, draw)"
				(keydown.enter)="onKeyClick($event, draw)"
				(keydown.space)="onKeyClick($event, draw)"
			></g>
		}
	</g>
</svg>
<app-gesture-indicators [indicators]="indicators"/>
