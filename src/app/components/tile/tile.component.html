<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 75 100" preserveAspectRatio="xMidYMid meet" [class.dark]="isDark()">
	@if (!sharedPrefix()) {
		<defs app-image-set-loader [imageSet]="imageSet()" [kyodaiUrl]="kyodaiUrl()" [dark]="isDark()" [prefix]="'t_'+imageSet()+'_'+index()+'_'"></defs>
	}
	<title>{{tile() | translate}}</title>
	<use [attr.xlink:href]="sharedPrefix() ? '#'+sharedPrefix()+tile() : '#t_'+imageSet()+'_'+index()+'_'+tile()" x="6" y="6" width="63" height="88"/>
</svg>
