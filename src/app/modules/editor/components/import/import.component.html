<div class="import-section" (appDropZone)="onDropFiles($event)">
	<div class="drop-zone">
		<div class="title">{{'EDITOR_IMPORT_DROP' | translate }}<br/>
			{{'EDITOR_FORMAT_KYODAI' | translate }}<br/>
			{{'EDITOR_FORMAT_KMAHJONGG' | translate }}<br/>
			{{'EDITOR_FORMAT_MAH' | translate }}<br/>
		</div>
		<input name="file" type="file" multiple (change)="selectFiles($event)" [attr.aria-label]="'EDITOR_IMPORT_DROP' | translate">
	</div>
	<div class="log-zone">
		@for (log of logs(); track log) {
			<p class="layout" [class.is-error]="log.isError">
				@if (log.id) {
					<button type="button" class="log-link" (click)="selectLayout(log.id)"><app-icon-ok /> {{ log.msg }}</button>
				}
				@if (!log.id) {
					{{ log.msg }}
				}
			</p>
		}
	</div>
</div>
