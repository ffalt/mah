config_version = "0"

exclude_patterns = [
  "*_min.*",
  "*-min.*",
  "*.min.*",
  "**/.yarn/**",
  "**/*.d.ts",
  "**/assets/**",
  "**/bower_components/**",
  "**/build/**",
  "**/cache/**",
  "**/config/**",
  "**/db/**",
  "**/deps/**",
  "**/dist/**",
  "**/extern/**",
  "**/external/**",
  "**/generated/**",
  "**/Godeps/**",
  "**/gradlew/**",
  "**/mvnw/**",
  "**/node_modules/**",
  "**/protos/**",
  "**/seed/**",
  "**/target/**",
  "**/templates/**",
  "**/testdata/**",
  "**/vendor/**",

  ".qlty/configs/**",
	"resources/images/**",
	"resources/apps/tauri/Cargo.lock",
  "resources/apps/tauri/gen/android/**"
]

test_patterns = [
  "**/test/**",
  "**/spec/**",
  "**/*.test.*",
  "**/*.spec.*",
  "**/*_test.*",
  "**/*_spec.*",
  "**/test_*.*",
  "**/spec_*.*",
]

[smells]
mode = "comment"

[[source]]
name = "default"
default = true


[[plugin]]
name = "actionlint"

[[plugin]]
name = "clippy"

[[plugin]]
name = "editorconfig-checker"
mode = "comment"

[[plugin]]
name = "checkov"

[[plugin]]
name = "eslint"
version = "10.3.0"
package_file = "package.json"
package_filters = ["eslint", "jest", "typescript"]

[[plugin]]
name = "hadolint"

[[plugin]]
name = "ktlint"
drivers = [
  "lint"
]

[[plugin]]
name = "markdownlint"
mode = "comment"

[[plugin]]
name = "osv-scanner"

[[plugin]]
name = "radarlint-java"
mode = "comment"

[[plugin]]
name = "radarlint-iac"
mode = "monitor"

[[plugin]]
name = "radarlint-kotlin"
mode = "monitor"

[[plugin]]
name = "radarlint-js"

[[plugin]]
name = "ripgrep"
mode = "comment"

[[plugin]]
name = "shellcheck"

[[plugin]]
name = "stylelint"
version = "17.11.0"
package_file = "package.json"
package_filters = ["stylelint"]

[[plugin]]
name = "trufflehog"

[[plugin]]
name = "yamllint"

[[plugin]]
name = "biome"

[[plugin]]
name = "oxc"

#[[plugin]]
#name = "knip"

[[plugin]]
name = "zizmor"


[[triage]]
match.file_patterns = ["src/app/model/solver/*"]
match.rules = [
	"radarlint-js:typescript:S4325" # This assertion is unnecessary since it does not change the type of the expression.
]
set.ignored = true

[[triage]]
match.file_patterns = [
	"resources/apps/rename-win.ps1",
	"resources/apps/rename-macos.sh",
	"resources/apps/rename-linux.sh",
	"README.md",
	".github/**/*",
	".qlty/qlty.toml"
]
match.rules = [
	"editorconfig-checker:unknown" # Wrong indentation type(spaces instead of tabs)
]
set.ignored = true

[[triage]]
match.file_patterns = ["**/*.spec.ts"]
match.rules = [
	"radarlint-js:typescript:S4623", # Remove this redundant "undefined".
	"radarlint-js:typescript:S2004", # Refactor this code to not nest functions more than 4 levels deep.
	"biome:lint/complexity/useLiteralKeys" #  The computed expression can be simplified without the use of a string literal.
]
set.ignored = true

[[triage]]
match.rules = [
	"biome:fmt", #  biome:fmt
	"biome:lint/suspicious/noSparseArray", #  Avoid empty slots in arrays.
	"biome:lint/a11y/useGenericFontNames", # Generic font family missing.
	"biome:lint/complexity/noStaticOnlyClass", #  Avoid classes that contain only static members.
	"biome:lint/style/noInferrableTypes", # This type annotation is trivially inferred from its initialization.
	"biome:lint/style/noNonNullAssertion", # Forbidden non-null assertion.
	"biome:lint/suspicious/noDuplicateTestHooks", # Disallow duplicate setup and teardown hooks.
	"biome:lint/suspicious/noExplicitAny", #  Unexpected any. Specify a different type.
	"biome:lint/suspicious/noAssignInExpressions", #  Avoid assignments in expressions (disabled because false positives).
	"biome:lint/style/useExponentiationOperator", # Use the '**' operator instead of 'Math.pow'
	"radarlint-js:javascript:S3776", # Refactor this function to reduce its Cognitive Complexity from 50 to the 15 allowed
	"radarlint-js:javascript:S3358", # Extract this nested ternary operation into an independent statement.
	"radarlint-js:typescript:S4140", # Unexpected comma in middle of array
	"radarlint-js:typescript:S125", # Remove this commented out code.
	"radarlint-js:typescript:S2301", # Provide multiple methods instead of using "x" to determine which action to take.
	"radarlint-js:typescript:S3626", # Remove this redundant jump.
	"radarlint-js:typescript:S3776", # Refactor this function to reduce its Cognitive Complexity
	"radarlint-js:typescript:S4043", # Move this array "sort" operation to a separate statement or replace it with "toSorted".
	"radarlint-js:typescript:S4138", # Expected a `for-of` loop instead of a `for` loop with this simple iteration.
	"radarlint-js:typescript:S4325", # This assertion is unnecessary since it does not change the type of the expression.
	"radarlint-js:typescript:S4335", # Remove this type without members or change this type intersection.
	"radarlint-js:typescript:S6564", # Remove this redundant type alias
	"radarlint-js:typescript:S107", # too many parameters
	"radarlint-js:typescript:S6671", # Expected the Promise rejection reason to be an Error.
	"radarlint-iac:docker:S7026", #Replace this invocation of curl with the ADD instruction.
	"radarlint-js:typescript:S2094", # Unexpected empty class.
	"stylelint:fmt", # stylelint:fmt
	"stylelint:value-keyword-case", # 'Expected "currentColor" to be "currentcolor"' (false positive)
	"hadolint:DL3018", # Pin versions in apk add
	"markdownlint:MD013", # Line length
	"markdownlint:MD024", # Multiple headings with the same content
	"markdownlint:MD033", # Inline HTML
	"markdownlint:MD041", # First line in a file should be a top-level heading
	"yamllint:quoted-strings", # string value is redundantly quoted with any quotes
	"checkov:CKV_DOCKER_2", # Ensure that HEALTHCHECK instructions have been added to container images
	"checkov:CKV_DOCKER_3" # Ensure that a user for the container has been created
]
set.ignored = true

