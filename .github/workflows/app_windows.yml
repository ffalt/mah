name: 'app-windows'

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*' # Push events to matching v*, i.e. v1.0, v20.15.10

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: 'windows-latest'
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Setup node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 26.x
          package-manager-cache: false

      - name: Write mah build config
        shell: powershell
        run: |
          $data = @{ name = 'Mah'; mobile = true }
          $data | ConvertTo-Json | Set-Content -Path custom-build-config.json


      - name: Install mah dependencies
        run: npm ci

      - name: Install tauri dependencies
        run: cd resources/apps && npm ci

      - name: Build windows app
        run: |
          cd resources/apps
          npm run windows


      - name: Upload windows artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: github.ref_type != 'tag'
        with:
          name: 'windows'
          retention-days: 10
          path: resources/apps/tauri/target/x86_64-pc-windows-msvc/release/bundle/

      - name: Wait for release
        if: github.ref_type == 'tag'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          for i in $(seq 1 20); do
            gh release view "$GITHUB_REF_NAME" > /dev/null 2>&1 && exit 0
            echo "Waiting for release to be created ($i/20)..."
            sleep 30
          done
          echo "Release not found after waiting" && exit 1

      - name: Upload release
        if: github.ref_type == 'tag'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          shopt -s globstar
          gh release upload "$GITHUB_REF_NAME" \
            resources/apps/tauri/target/x86_64-pc-windows-msvc/release/bundle/**/*.msi \
            resources/apps/tauri/target/x86_64-pc-windows-msvc/release/bundle/**/*.exe
