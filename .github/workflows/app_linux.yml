name: 'app-linux'

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*' # Push events to matching v*, i.e. v1.0, v20.15.10

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: 'ubuntu-22.04'
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 26.x
          package-manager-cache: false

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf


      - name: Write mah build config
        run: |
          echo "{\"name\": \"Mah\", \"mobile\":true}" > custom-build-config.json


      - name: Install mah dependencies
        run: npm ci

      - name: Install tauri dependencies
        run: cd resources/apps && npm ci

      - name: Build linux app
        run: |
          cd resources/apps
          npm run linux


      - name: Upload linux artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: github.ref_type != 'tag'
        with:
          name: 'linux'
          retention-days: 10
          path: |
            resources/apps/tauri/target/release/bundle/**/*.rpm
            resources/apps/tauri/target/release/bundle/**/*.deb
            resources/apps/tauri/target/release/bundle/**/*.AppImage

      - name: Wait for release
        if: github.ref_type == 'tag'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for i in $(seq 1 20); do
            gh release view "$GITHUB_REF_NAME" > /dev/null 2>&1 && exit 0
            echo "Waiting for release to be created ($i/20)..."
            sleep 30
          done
          echo "Release not found after waiting" && exit 1

      - name: Upload release
        if: github.ref_type == 'tag'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          shopt -s globstar
          gh release upload "$GITHUB_REF_NAME" \
            resources/apps/tauri/target/release/bundle/**/*.rpm \
            resources/apps/tauri/target/release/bundle/**/*.deb \
            resources/apps/tauri/target/release/bundle/**/*.AppImage
